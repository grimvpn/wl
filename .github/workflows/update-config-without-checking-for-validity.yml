name: GrimVPN Whitelist Collector wcfv

on:
  #schedule:
  #  - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write 

jobs:
  update-config:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch, Filter, Deduplicate and Build Config
        run: |
          cat << 'EOF' > config-wcfv.txt
          #profile-title: GrimVPN WL
          #profile-update-interval: 12
          #announce: BEST CONFIG | WHITE LIST
          #support-url: https://t.me/GrimVpnBot
          #profile-web-page-url: https://grimvpn.github.io/
          #hide-settings: 0
          EOF

          echo "" >> config-wcfv.txt

          {
            curl -sSL "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-all.txt"
            echo ""
            curl -sSL "https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_universal.txt"
            echo ""
          } | sed 's/\r$//' | grep -vE '^\s*#|^\s*$' | sort -u >> config-wcfv.txt

      - name: Commit and Push changes
        run: |
          git config --local user.email "grimvpncorporation@gmail.com"
          git config --local user.name "grimvpn"
          
          git add config-wcfv.txt
          
          git commit --allow-empty -m "Auto-update: База обновлена (wcfv)."
          git pull --rebase origin main
          git push

#git config --local user.email "github-actions[bot]@users.noreply.github.com"
#          git config --local user.name "github-actions[bot]"
