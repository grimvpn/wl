name: GrimVPN Whitelist Collector Test (Xray Core)

on:
  # schedule:
  #   - cron: '0 * * * *'
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  update-config:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Xray Core
        run: |
          echo "Скачиваем последнюю версию Xray-core..."
          XRAY_VERSION=$(curl -s https://api.github.com/repos/XTLS/Xray-core/releases/latest | grep tag_name | cut -d '"' -f 4)
          curl -s -L -o xray.zip "https://github.com/XTLS/Xray-core/releases/download/${XRAY_VERSION}/Xray-linux-64.zip"
          unzip -q xray.zip xray
          chmod +x xray

      - name: Fetch, Filter, Verify Connections & Build Config
        run: |
          # Создаем базовую структуру конфига
          cat << 'EOF' > configtest.txt
          #profile-title: GrimVPN WL
          #profile-update-interval: 12
          #announce: BEST CONFIG | WHITE LIST
          #support-url: https://t.me/GrimVpnBot
          #profile-web-page-url: https://grimvpn.github.io/
          #hide-settings: 0
          EOF

          echo "" >> configtest.txt

          # Собираем сырые базы
          echo "Загружаем базы..."
          {
            curl -sSL "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-all.txt"
            echo ""
            curl -sSL "https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_universal.txt"
            echo ""
          } | sed 's/\r$//' | grep -vE '^\s*#|^\s*$' | sort -u > temp_connections.txt

          # Создаем Python-чекер
          cat << 'EOF' > checker.py
          import re
          import os
          import json
          import time
          import subprocess
          import threading
          import urllib.request
          from urllib.parse import urlparse, parse_qs
          from concurrent.futures import ThreadPoolExecutor

          port_lock = threading.Lock()
          current_port = 10000

          def check_node(line):
              global current_port
              line = line.strip()
              if not line or not line.startswith("vless://"):
                  return None

              # Безопасное выделение уникального порта
              with port_lock:
                  local_port = current_port
                  current_port += 1
                  if current_port > 20000:
                      current_port = 10000

              proc = None
              config_path = f"config_{local_port}.json"
              success = False

              try:
                  url = urlparse(line)
                  uuid = url.username
                  
                  if not uuid and "@" in url.netloc:
                      parts = url.netloc.split("@")
                      uuid = parts[0]
                      host_port = parts[1].split(":")
                      host = host_port[0]
                      port = int(host_port[1])
                  else:
                      host = url.hostname
                      port = url.port

                  params = parse_qs(url.query)
                  
                  security = params.get('security', ['none'])[0]
                  network = params.get('type', ['tcp'])[0]
                  sni = params.get('sni', [''])[0]
                  fp = params.get('fp', ['chrome'])[0]
                  pbk = params.get('pbk', [''])[0]
                  sid = params.get('sid', [''])[0]
                  path = params.get('path', [''])[0]
                  serviceName = params.get('serviceName', [''])[0]
                  flow = params.get('flow', [''])[0]

                  # Генерация конфига Xray
                  config = {
                      "log": {"loglevel": "none"},
                      "inbounds": [{
                          "listen": "127.0.0.1",
                          "port": local_port,
                          "protocol": "http",
                          "settings": {}
                      }],
                      "outbounds": [{
                          "protocol": "vless",
                          "settings": {
                              "vnext": [{
                                  "address": host,
                                  "port": int(port),
                                  "users": [{"id": uuid, "encryption": "none"}]
                              }]
                          },
                          "streamSettings": {
                              "network": network,
                              "security": security
                          }
                      }]
                  }

                  if flow:
                      config["outbounds"][0]["settings"]["vnext"][0]["users"][0]["flow"] = flow

                  ss = config["outbounds"][0]["streamSettings"]
                  if security == "tls":
                      ss["tlsSettings"] = {"serverName": sni}
                  elif security == "reality":
                      ss["realitySettings"] = {
                          "serverName": sni,
                          "fingerprint": fp,
                          "publicKey": pbk,
                          "shortId": sid
                      }

                  if network == "ws":
                      ss["wsSettings"] = {"path": path, "headers": {"Host": sni if sni else host}}
                  elif network == "grpc":
                      ss["grpcSettings"] = {"serviceName": serviceName}

                  with open(config_path, "w") as f:
                      json.dump(config, f)

                  # Запуск Xray
                  proc = subprocess.Popen(['./xray', '-c', config_path], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
                  time.sleep(0.4) # Даем ядру время на инициализацию

                  # Тест пропускной способности (Layer 7)
                  proxy_handler = urllib.request.ProxyHandler({'http': f'http://127.0.0.1:{local_port}'})
                  opener = urllib.request.build_opener(proxy_handler)
                  
                  start_time = time.time()
                  req = urllib.request.Request('http://cp.cloudflare.com/generate_204', headers={'User-Agent': 'Mozilla/5.0'})
                  
                  with opener.open(req, timeout=2.5) as resp:
                      latency = (time.time() - start_time) * 1000
                      if resp.status == 204 and latency <= 750:
                          success = True

              except Exception:
                  pass
              finally:
                  # Гарантированная зачистка процессов и файлов
                  if proc:
                      proc.terminate()
                      proc.wait()
                  if os.path.exists(config_path):
                      try:
                          os.remove(config_path)
                      except Exception:
                          pass

              return line if success else None

          if __name__ == "__main__":
              with open("temp_connections.txt", "r") as f:
                  lines = f.readlines()

              print(f"Начинаем проверку {len(lines)} серверов через ядро Xray...")
              
              with ThreadPoolExecutor(max_workers=20) as executor:
                  results = executor.map(check_node, lines)

              valid_count = 0
              with open("configtest.txt", "a") as out_f:
                  for res in results:
                      if res:
                          out_f.write(res + "\n")
                          valid_count += 1
              
              print(f"Проверка завершена. Рабочих серверов добавлено: {valid_count}")
          EOF

          python3 checker.py

          # Зачистка временных файлов
          rm -f temp_connections.txt checker.py xray xray.zip

      - name: Commit and Push changes
        run: |
          git config --local user.email "grimvpncorporation@gmail.com"
          git config --local user.name "grimvpn"
          
          git add configtest.txt
          
          git commit --allow-empty -m "Auto-update: База обновлена (Xray Core Layer-7 filter)."
          
          # Очистка рабочей директории и безопасный пуш
          git reset --hard
          git clean -fd
          
          git pull --rebase origin main
          git push
